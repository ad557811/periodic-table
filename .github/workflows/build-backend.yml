name: Build Periodic Table backend

on: workflow_dispatch

jobs:
  build-app:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        shell: bash
        run: |
          cd periodic-table-microservice
          mvn -B clean verify
