services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    restart: on-failure:1
    env_file: .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_DB_PASSWORD}"

  backend:
    env_file: .env
    restart: on-failure:1
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      PT_PASSWORD: "${PT_PASSWORD}"
    depends_on:
      - postgres
    build:
      context: ./periodic-table-microservice

  frontend:
    restart: on-failure:1
    environment:
      BACKEND_URL: http://backend:8080
    ports:
     - "4200:4200"
    build:
      context: ./periodic-table-app

volumes:
  postgres-data: